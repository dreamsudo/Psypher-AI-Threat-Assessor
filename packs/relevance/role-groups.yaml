    d3fend_artifact: "http://d3fend.mitre.org/ontologies/d3fend.owl#WebServer"
  - name: privilege_mgmt
    tier: host_privesc
    patterns: [sudo, policykit, polkit, pkexec, systemd, dbus]
    techniques: [T1548, T1543, T1053]
    d3fend_artifact: "http://d3fend.mitre.org/ontologies/d3fend.owl#AccessToken"
  - name: crypto_transport
    tier: crypto_network
    patterns: [openssl, libssl, libcrypto, openssl-libs, gnutls, openssh, libssh, curl, libcurl, glibc, libc6, nss, libnss]
    techniques: [T1552, T1573, T1557, T1040]
